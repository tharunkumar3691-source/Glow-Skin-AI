kind = "web"
previewPath = "/"
title = "GlowSkin AI"
version = "1.0.0"
id = "artifacts/glowskin-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20787
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/glowskin-ai run dev"

[services.env]
PORT = "20787"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/glowskin-ai", "run", "build"]
publicDir = "artifacts/glowskin-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
